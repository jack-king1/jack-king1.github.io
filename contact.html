---
layout: contact
title: Contact
permalink: /contact/
---

<div class="container mtb">
    <div class="row">
        <div class="col-lg-8">
            <h4>Get In Touch!</h4>
            <div class="hline"></div>
            <p>{{ site.about }}</p>
            <form role="form">
                <div class="form-group">
                    <label for="InputName1">Your Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="exampleInputName1"
                    />
                </div>
                <div class="form-group">
                    <label for="InputEmail1">Email address</label>
                    <input
                        type="email"
                        class="form-control"
                        id="exampleInputEmail1"
                    />
                </div>
                <div class="form-group">
                    <label for="InputSubject1">Subject</label>
                    <input
                        type="text"
                        class="form-control"
                        id="exampleInputSubject1"
                    />
                </div>
                <div class="form-group">
                    <label for="message1">Message</label>
                    <textarea
                        class="form-control"
                        id="message1"
                        rows="3"
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-theme">Submit</button>
            </form>
        </div>
        <!--/col-lg-8 -->

        <div class="col-lg-4">
            <div class="col-lg-8 col-lg-offset-2">
                <h3>Software Developer</h3>
                <p>
                    Experience with C#, Javascript, Web Development, Game
                    Development, SQL, Scrum and More!
                </p>
            </div>
            <div
                class="col-lg-8 col-lg-offset-2 himg d-flex justify-content-center"
            >
                <img src="{{ "/assets/img/profile.jpeg" | prepend: site.baseurl
                }}" class="img-responsive img-circle">
            </div>
        </div>
    </div>
    <!--/row -->
</div>
<!--/container -->
